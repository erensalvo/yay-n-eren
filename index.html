<!DOCTYPE html>
<html>
<head>
    <title>Eren Yayın Paneli :)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        video { 
    width: 100%; 
    border: 2px solid #8c1724; /* derin mat bordo */
    border-radius: 12px; 
    background: #000; 
    box-shadow: 0 0 25px rgba(206, 17, 38, 0.3); /* Videonun etrafına hafif kırmızı parlama ekledik */
}
        .btn-group { margin-top: 20px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        button {
    padding: 14px 24px;
    border: 1px solid rgba(255, 255, 255, 0.1); /* İnce, şeffaf bir çerçeve */
    border-radius: 12px;
    background: linear-gradient(145deg, #1e1e1e, #161616); /* Hafif derinlik veren geçiş */
    color: #e0e0e0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Esnek ve elit bir geçiş */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(5px); /* Arka planı hafif bulandırır (Cam efekti) */
    letter-spacing: 0.5px;
}

button:hover {
    background: #8c1724; /* derin met bordo */
    color: #fff;
    transform: translateY(-5px) scale(1.05); /* Hem yukarı zıplar hem hafif büyür */
    border-color: rgba(255, 255, 255, 0.5);
    box-shadow: 0 8px 25px rgba(206, 17, 38, 0.5); /* Kırmızı asil bir parlama */
}

/* Tıkladığında basılma hissi veren efekt */
button:active {
    transform: translateY(-2px) scale(0.98);
}
    </style>
</head>
<body>

<div class="container">
    <h1 id="channel-title">BeIN Sports 1</h1>
    <video id="video" autoplay muted playsinline></video>
<div id="welcome-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; justify-content:center; align-items:center; backdrop-filter: blur(5px);">
    <button onclick="startApp()" style="padding:20px 50px; background:#8c1724; color:white; border:2px solid #ff0000; border-radius:12px; cursor:pointer; font-weight:bold; font-size:24px; box-shadow: 0 0 30px rgba(140, 23, 36, 0.6); transition: 0.3s; letter-spacing: 2px;">
        SİTEYE GİRİŞ YAP
    </button>
</div>
    <div class="btn-group">
        <button onclick="changeChannel('BeIN Sports 1', 'https://hlssssssssssss.vipescgidiyom.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-11.m3u8')">BeIN 1</button>
        <button onclick="changeChannel('BeIN Sports 2', 'https://hlssssssssssss.vipescgidiyom.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-2.m3u8')">BeIN 2</button>
        <button onclick="changeChannel('BeIN Sports 3', 'https://hlssssssssssss.vipescgidiyom.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-3.m3u8')">BeIN 3</button>
        <button onclick="changeChannel('BeIN Sports 4', 'https://hlssssssssssss.vipescgidiyom.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-4.m3u8')">BeIN 4</button>
        <button onclick="changeChannel('TRT 1', 'https://tv-trt1.medya.trt.com.tr/master_1440.m3u8')">TRT 1</button>
        <button onclick="playLocalVideo('Özel Video', 'WhatsApp Video 2026-04-20 at 15.21.15.mp4')">S SPORT</button>
    </div>
</div>

<script>
  var video = document.getElementById('video');
  var hls = new Hls();

  function changeChannel(name, url) {
    document.getElementById('channel-title').innerText = name;
    
    if (Hls.isSupported()) {
      hls.destroy(); // Eski yayını temizle
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play();
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play();
    }
  }

  // Sayfa ilk açıldığında varsayılan olarak BeIN 1 başlasın
  changeChannel('BeIN Sports 1', 'https://dga1op10s1u3leo.2cc1c0fe5e38a1.click/live/xbeinsports-1/playlist.m3u8');
    function startApp() {
    const screen = document.getElementById('welcome-screen');
    screen.style.transition = 'opacity 0.8s ease'; // Yumuşak kapanış
    screen.style.opacity = '0';
    setTimeout(() => {
        screen.style.display = 'none';
    }, 800);
}
   function playLocalVideo(name, url) {
    document.getElementById('channel-title').innerText = name;
    
    // Canlı yayın motorunu tamamen kapat ve temizle
    if (hls) {
        hls.destroy();
        hls = new Hls(); 
    }
    
    video.src = url;
    video.loop = true;  // SADECE BU FONKSİYONDA video bitince başa sarar.
    video.controls = false; // saniye barını ve butonları tamamen gizler.
    video.load();
    video.play();
}
</script>

</body>
</html>
