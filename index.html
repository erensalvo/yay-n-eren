<!DOCTYPE html>
<html>
<head>
    <title>Eren Yayın Paneli :)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        video { 
    width: 100%; 
    border: 2px solid #8c1724; /* derin mat bordo */
    border-radius: 12px; 
    background: #000; 
    box-shadow: 0 0 25px rgba(206, 17, 38, 0.3); /* Videonun etrafına hafif kırmızı parlama ekledik */
}
        .btn-group { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button {
    padding: 14px 24px;
    border: 1px solid rgba(255, 255, 255, 0.1); /* İnce, şeffaf bir çerçeve */
    border-radius: 12px;
    background: linear-gradient(145deg, #1e1e1e, #161616); /* Hafif derinlik veren geçiş */
    color: #e0e0e0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Esnek ve elit bir geçiş */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(5px); /* Arka planı hafif bulandırır (Cam efekti) */
    letter-spacing: 0.5px;
}

button:hover {
    background: #8c1724; /* derin met bordo */
    color: #fff;
    transform: translateY(-5px) scale(1.05); /* Hem yukarı zıplar hem hafif büyür */
    border-color: rgba(255, 255, 255, 0.5);
    box-shadow: 0 8px 25px rgba(206, 17, 38, 0.5); /* Kırmızı asil bir parlama */
}

/* Tıkladığında basılma hissi veren efekt */
button:active {
    transform: translateY(-2px) scale(0.98);
}
    </style>
</head>
<body>

<div class="container">
    <h1 id="channel-title">BeIN Sports 1</h1>
    <video id="video" controls autoplay></video>

    <div class="btn-group">
        <button onclick="changeChannel('BeIN Sports 1', 'https://dga1op10s1u3leo.2cc1c0fe5e38a1.click/live/xbeinsports-1/playlist.m3u8')">BeIN 1</button>
        <button onclick="changeChannel('BeIN Sports 2', 'https://dga1op10s1u3leo.2cc1c0fe5e38a1.click/live/xbeinsports-2/playlist.m3u8')">BeIN 2</button>
        <button onclick="changeChannel('BeIN Sports 3', 'https://hlssssssssssss.naciyeyildiz7361.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-3.m3u8')">BeIN 3</button>
        <button onclick="changeChannel('BeIN Sports 4', 'https://bo.936dab6269d24038cd.workers.dev/f6e33e69e0fdec0a7780e174f3c8b2c2/DmodYM9CdSNPUZyc2x7VWd/780/bo.936dab6269d24038cd.workers.dev/chunklist_hd.m3u8')">BeIN 4</button>
        <button onclick="changeChannel('TRT 1', 'https://tv-trt1.medya.trt.com.tr/master_1440.m3u8')">TRT 1</button>
        <button onclick="changeChannel('TV 8', ''https://tv-trt1.medya.trt.com.tr/master.m3u8'')">TV 8</button>
        
    </div>
</div>

<script>
  var video = document.getElementById('video');
  var hls = new Hls();

  function changeChannel(name, url) {
    document.getElementById('channel-title').innerText = name;
    
    if (Hls.isSupported()) {
      hls.destroy(); // Eski yayını temizle
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play();
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play();
    }
  }

  // Sayfa ilk açıldığında varsayılan olarak BeIN 1 başlasın
  changeChannel('BeIN Sports 1', 'LINK_1_BURAYA');
</script>

</body>
</html>
