button:hover {

    body {
    background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); /* Derin karanlık gradyanın */
    color: white;
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    
    /* İŞTE ARKA PLANI DOLDURAN EFELT BURADA: */
    /* 1. Uzay filmlerindeki gibi yarı saydam bir 'veri ızgarası' ekliyoruz. */
    background-image: 
        linear-gradient(rgba(131, 28, 12, 0.05) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(131, 28, 12, 0.05) 1px, transparent 1px);
    background-size: 20px 20px; /* Izgaranın büyüklüğü */
    
    /* 2. Buna bir de 'sinyal paraziti' efekti katalım, sanki veriler akıyor gibi. */
    position: relative;
    overflow-x: hidden;
}

/* 3. Ve o ızgaranın üzerinde çok hafif, hareketli bir 'sinyal dalgası' gezdirelim. */
body::after {
    content: "";
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    /* Çok hafif, saydam bir dalga */
    background: repeating-linear-gradient(0deg, transparent, transparent 100px, rgba(131, 28, 12, 0.02) 101px, rgba(131, 28, 12, 0.02) 102px);
    animation: signalWave 10s linear infinite;
    z-index: -1; /* En altta, her şeyin arkasında kalsın */
    pointer-events: none;
}

@keyframes signalWave {
    from { transform: translateY(0%); }
    to { transform: translateY(50%); }
}

/* Tıkladığında basılma hissi veren efekt */
button:active {
    transform: translateY(-2px) scale(0.98);

<script>
  var video = document.getElementById('video');
  var hls = new Hls();

  function changeChannel(name, url) {
    document.getElementById('channel-title').innerText = name;
    
    if (Hls.isSupported()) {
      hls.destroy(); // Eski yayını temizle
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play();
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play();
    }
  }

  // Sayfa ilk açıldığında varsayılan olarak BeIN 1 başlasın
  changeChannel('BeIN Sports 1', 'https://dga1op10s1u3leo.2cc1c0fe5e38a1.click/live/xbeinsports-1/playlist.m3u8');
    function startApp() {
    const screen = document.getElementById('welcome-screen');
    screen.style.transition = 'opacity 0.8s ease'; // Yumuşak kapanış
    screen.style.opacity = '0';
    setTimeout(() => {
        screen.style.display = 'none';
    }, 800);
}
   function playLocalVideo(name, url) {
    document.getElementById('channel-title').innerText = name;
    
    // Canlı yayın motorunu tamamen kapat ve temizle
    if (hls) {
        hls.destroy();
        hls = new Hls(); 
    }
    
    video.src = url;
    video.loop = true;  // SADECE BU FONKSİYONDA video bitince başa sarar.
    video.load();
    video.play();
}
    function updateClock() {
    const now = new Date();
    document.getElementById('digital-clock').innerText = now.toLocaleTimeString();
    
    const baseViewers = 800;
    const randomExtra = Math.floor(Math.random() * 20);
    document.getElementById('viewers').innerText = (baseViewers + randomExtra).toLocaleString();
}
setInterval(updateClock, 1000);
updateClock();
</script>
