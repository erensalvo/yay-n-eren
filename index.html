<!DOCTYPE html>
<html>
<head>
    <title>Eren Yayın Paneli :)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        video { 
    width: 100%; 
    border: 2px solid #8c1724; /* derin mat bordo */
    border-radius: 12px; 
    background: #000; 
    box-shadow: 0 0 25px rgba(206, 17, 38, 0.3); /* Videonun etrafına hafif kırmızı parlama ekledik */
}
        .btn-group { margin-top: 20px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        button {
    padding: 14px 24px;
    border: 1px solid rgba(255, 255, 255, 0.1); /* İnce, şeffaf bir çerçeve */
    border-radius: 12px;
    background: linear-gradient(145deg, #1e1e1e, #161616); /* Hafif derinlik veren geçiş */
    color: #e0e0e0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Esnek ve elit bir geçiş */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(5px); /* Arka planı hafif bulandırır (Cam efekti) */
    letter-spacing: 0.5px;
}

button:hover {
    background: #8c1724; /* derin met bordo */
    color: #fff;
    transform: translateY(-5px) scale(1.05); /* Hem yukarı zıplar hem hafif büyür */
    border-color: rgba(255, 255, 255, 0.5);
    box-shadow: 0 8px 25px rgba(206, 17, 38, 0.5); /* Kırmızı asil bir parlama */
} 
    body {
    background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
    color: white;
    text-align: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
}

/* Tıkladığında basılma hissi veren efekt */
button:active {
    transform: translateY(-2px) scale(0.98);
}/* Arka Planı Premium Yap */
body {
    background: radial-gradient(circle, #1a1a1a 0%, #000000 100%) !important;
    margin: 0;
    padding: 20px;
}

/* Yanıp Sönen Kırmızı Nokta */
.live-dot {
    height: 10px;
    width: 10px;
    background-color: #ff0000;
    border-radius: 50%;
    display: inline-block;
    margin-right: 10px;
    box-shadow: 0 0 10px #ff0000;
    animation: blinker 1.5s linear infinite;
}

@keyframes blinker {
    50% { opacity: 0; }
} 
.top-info {
    position: fixed;
    top: 20px;
    right: 20px;
    text-align: right;
    font-family: 'Courier New', Courier, monospace;
    color: #ff0000;
    text-shadow: 0 0 5px #ff0000;
    font-weight: bold;
    z-index: 1000;
}

#digital-clock {
    font-size: 24px;
    margin-bottom: 5px;
}

.viewer-count {
    font-size: 14px;
    color: #eee;
    text-shadow: none;
}
    </style>
</head>
<body>
<div class="top-info">
    <div id="digital-clock">00:00:00</div>
    <div class="viewer-count"><span class="live-dot"></span> <span id="viewers">800</span> İZLEYİCİ</div>
</div> 
<div class="container">
    <h1 id="channel-title">BeIN Sports 1</h1>
    <video id="video" controls autoplay></video>
<div id="welcome-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; justify-content:center; align-items:center; backdrop-filter: blur(5px);">
    <button onclick="startApp()" style="padding:20px 50px; background:#8c1724; color:white; border:2px solid #ff0000; border-radius:12px; cursor:pointer; font-weight:bold; font-size:24px; box-shadow: 0 0 30px rgba(140, 23, 36, 0.6); transition: 0.3s; letter-spacing: 2px;">
        SİTEYE GİRİŞ YAP
    </button>
</div>
    <div class="btn-group">
        <button onclick="changeChannel('BeIN Sports 1', 'https://hlsssssss.yesbeits.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-11.m3u8')"><span class="live-dot"></span>BeIN 1</button>
        <button onclick="changeChannel('BeIN Sports 2', 'https://hlsssssss.yesbeits.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-2.m3u8')"><span class="live-dot"></span>BeIN 2</button>
        <button onclick="changeChannel('BeIN Sports 3', 'https://hlsssssss.yesbeits.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-3.m3u8')"><span class="live-dot"></span>BeIN 3</button>
        <button onclick="changeChannel('BeIN Sports 4', 'https://hlsssssss.yesbeits.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-4.m3u8')"><span class="live-dot"></span>BeIN 4</button>
        <button onclick="changeChannel('TRT 1', 'https://tv-trt1.medya.trt.com.tr/master_1440.m3u8')"><span class="live-dot"></span>TRT 1</button>
        <button onclick="playLocalVideo('S SPORT', 'WhatsApp Video 2026-04-20 at 15.21.15.mp4')"><span class="live-dot"></span>S SPORT</button>
    </div>
</div>

<script>
  var video = document.getElementById('video');
  var hls = new Hls();

  function changeChannel(name, url) {
    document.getElementById('channel-title').innerText = name;
    
    if (Hls.isSupported()) {
      hls.destroy(); // Eski yayını temizle
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play();
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play();
    }
  }

  // Sayfa ilk açıldığında varsayılan olarak BeIN 1 başlasın
  changeChannel('BeIN Sports 1', 'https://dga1op10s1u3leo.2cc1c0fe5e38a1.click/live/xbeinsports-1/playlist.m3u8');
    function startApp() {
    const screen = document.getElementById('welcome-screen');
    screen.style.transition = 'opacity 0.8s ease'; // Yumuşak kapanış
    screen.style.opacity = '0';
    setTimeout(() => {
        screen.style.display = 'none';
    }, 800);
}
   function playLocalVideo(name, url) {
    document.getElementById('channel-title').innerText = name;
    
    // Canlı yayın motorunu tamamen kapat ve temizle
    if (hls) {
        hls.destroy();
        hls = new Hls(); 
    }
    
    video.src = url;
    video.loop = true;  // SADECE BU FONKSİYONDA video bitince başa sarar.
    video.load();
    video.play();
}
    function updateClock() {
    const now = new Date();
    document.getElementById('digital-clock').innerText = now.toLocaleTimeString();
    
    const baseViewers = 1240;
    const randomExtra = Math.floor(Math.random() * 20);
    document.getElementById('viewers').innerText = (baseViewers + randomExtra).toLocaleString();
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
