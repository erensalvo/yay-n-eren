<!DOCTYPE html>
<html>
<head>
    <title>Eren Yayın Panel :)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        video { width: 80%; border: 2px solid #444; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Canlı Yayın Test</h1>
    <video id="video" controls autoplay></video>

    <script>
      var video = document.getElementById('video');
      // BURAYA KENDİ LİNKİNİ YAPIŞTIR
      var videoSrc = 'https://dga1op10s1u3leo.2cc1c0fe5e38a1.click/live/xbeinsports-1/playlist.m3u8'; 
      
      if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
      }
    </script>
    <p>Eren Övecek - 2026</p>
</body>
</html>
